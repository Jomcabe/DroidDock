# XcodeGen specification — the single source of truth for DroidDock.xcodeproj.
# Regenerate the project with `xcodegen generate` (or `make generate`).
#
#   brew install xcodegen
#
name: DroidDock

options:
  bundleIdPrefix: com.droiddock
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

packages:
  # Sparkle powers in-app automatic updates (appcast + EdDSA-signed downloads).
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  DroidDock:
    type: application
    platform: macOS
    deploymentTarget: "14.0"

    dependencies:
      - package: Sparkle

    sources:
      # All Swift sources + Assets.xcassets, minus the things handled specially.
      - path: DroidDock
        excludes:
          - "Info.plist"
          - "DroidDock.entitlements"
          - "Resources/vendor"
          - "Resources/vendor/**"
      # The embedded toolchain is added as a *folder reference* so its directory
      # structure (the static scrcpy binary + scrcpy-server) is copied verbatim
      # into Contents/Resources/vendor. Populated by the pre-build script below.
      - path: DroidDock/Resources/vendor
        type: folder

    settings:
      base:
        INFOPLIST_FILE: DroidDock/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.droiddock.DroidDock
        PRODUCT_NAME: DroidDock
        CODE_SIGN_ENTITLEMENTS: DroidDock/DroidDock.entitlements
        # Ad-hoc signing → builds & runs locally on Apple Silicon without an
        # Apple Developer account. Use scripts/codesign-app.sh for distribution.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

    preBuildScripts:
      - name: "Provision embedded adb & scrcpy"
        basedOnDependencyAnalysis: false
        shell: /bin/bash
        script: |
          set -euo pipefail
          "$SRCROOT/scripts/fetch-binaries.sh"

schemes:
  DroidDock:
    build:
      targets:
        DroidDock: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
