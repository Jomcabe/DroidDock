name: Build DroidDock

# Builds DroidDock on a macOS runner and publishes a ready-to-run, ad-hoc-signed
# DroidDock.app. Download it from the run's "Artifacts" (or, for tagged releases,
# from the GitHub Release) and drag it into /Applications — no terminal, no
# build tools on your Mac.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & package DroidDock.app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Provision embedded adb & scrcpy
        run: ./scripts/fetch-binaries.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, ad-hoc signed)
        run: |
          set -o pipefail
          # On a tag (v1.2.0) stamp the bundle so Sparkle can compare versions:
          # MARKETING_VERSION = the tag, CURRENT_PROJECT_VERSION = a monotonic
          # integer derived from semver (1.2.0 -> 10200), no git history needed.
          EXTRA=()
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            MV="${GITHUB_REF_NAME#v}"
            IFS='.' read -r MA MI PA <<< "${MV}"
            CV=$(( ${MA:-0} * 10000 + ${MI:-0} * 100 + ${PA:-0} ))
            EXTRA+=( "MARKETING_VERSION=${MV}" "CURRENT_PROJECT_VERSION=${CV}" )
            echo "Stamping release ${MV} (build ${CV})"
          fi
          xcodebuild \
            -project DroidDock.xcodeproj \
            -scheme DroidDock \
            -configuration Release \
            -derivedDataPath build \
            "${EXTRA[@]}" \
            build

      - name: Package DroidDock.app.zip
        working-directory: build/Build/Products/Release
        run: |
          ditto -c -k --sequesterRsrc --keepParent DroidDock.app DroidDock.app.zip
          shasum -a 256 DroidDock.app.zip | tee DroidDock.app.zip.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DroidDock-macos
          path: |
            build/Build/Products/Release/DroidDock.app.zip
            build/Build/Products/Release/DroidDock.app.zip.sha256
          if-no-files-found: error

      # Sign the build and generate the Sparkle appcast. Needs the SPARKLE_PRIVATE_KEY
      # secret (the EdDSA private key from `generate_keys`); skipped cleanly if unset,
      # so the rest of the release still publishes.
      - name: Generate signed Sparkle appcast (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SPARKLE_VERSION: "2.6.0"
        working-directory: build/Build/Products/Release
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "::warning::SPARKLE_PRIVATE_KEY secret not set — skipping appcast (auto-update won't be served for this release)."
            exit 0
          fi
          # Fetch Sparkle's command-line tools (generate_appcast signs + writes the feed).
          curl -fL --retry 4 --retry-delay 2 -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          KEYFILE="$(mktemp)"
          printf '%s' "${SPARKLE_PRIVATE_KEY}" > "${KEYFILE}"
          # generate_appcast scans this dir's archives, reads each app's version from
          # its Info.plist, signs them, and writes appcast.xml with the right URLs.
          /tmp/sparkle/bin/generate_appcast \
            --ed-key-file "${KEYFILE}" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            .
          rm -f "${KEYFILE}"
          echo "Generated appcast.xml:"; cat appcast.xml

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Build/Products/Release/DroidDock.app.zip
            build/Build/Products/Release/DroidDock.app.zip.sha256
            build/Build/Products/Release/appcast.xml
